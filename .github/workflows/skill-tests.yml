name: skill-tests

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  skill-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Run skill evals
        env:
          SPA_DATA_DIR: ${{ runner.temp }}/spa_data
          SPA_AUDIT_DIR: ${{ runner.temp }}/spa_audit
        run: |
          mkdir -p "$SPA_DATA_DIR" "$SPA_AUDIT_DIR"
          make eval
      - run: python -m pytest tests/ -q
