name: policy-lint

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  policy-lint:
    runs-on: ubuntu-latest
    env:
      SPA_NO_LLM: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: make policy-lint
