name: redteam

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * *"

jobs:
  redteam:
    runs-on: ubuntu-latest
    env:
      SPA_NO_LLM: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: chmod +x scripts/redteam.sh && make redteam
