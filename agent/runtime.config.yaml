# Agent runtime configuration — swap runtime without changing skills/brain.
runtime: hermes
version: "0.1"

hermes:
  binary: hermes
  mcp_config_dir: mcp/
  skills_dir: skills/
  charter: agent/charter.md
  policy: agent/autonomy-policy.yaml

