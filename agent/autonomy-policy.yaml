# Single source of truth for action-risk gates (governance-as-code).
version: "1.0"
defaults:
  ticket_assignee: unassigned
  pr_mode: draft
  policy_write_path: brain/03-policies/proposals/
  unknown_tool_class: A5

action_classes:
  A0:
    label: read
    approval: none
    log: true
    examples:
      - read_inbox
      - read_brain
      - read_tickets
      - read_findings
      - search_memory
  A1:
    label: local_draft
    approval: none
    log: true
    examples:
      - write_local_markdown
      - create_local_branch
      - create_cpo
      - write_workspace_draft
  A2:
    label: external_draft
    approval: notify
    log: true
    examples:
      - create_draft_pr
      - create_ai_proposed_ticket
      - add_provenance_comment
  A3:
    label: human_workflow
    approval: required
    log: true
    block_without_cpo: true
    examples:
      - assign_human
      - raise_priority_above_high
      - change_due_date
      - terminal_ticket_state
  A4:
    label: authoritative_record
    approval: required
    log: true
    block_without_cpo: true
    examples:
      - merge_pr
      - publish_policy
      - grc_write
      - create_ticket_live
  A5:
    label: high_risk
    approval: blocked
    log: true
    examples:
      - prod_iam_change
      - secret_rotation
      - delete_evidence
      - delete_audit_logs
      - risk_acceptance

tool_mappings:
  read_file: A0
  search_memory: A0
  ingest_file: A0
  pga_ingest: A0
  pga_proposals_list: A0
  pga_proposals_show: A0
  pga_audit_verify: A0
  pga_memory_search: A0
  pga_run_skill: A1
  pga_proposals_approve: A3
  pga_proposals_reject: A3
  memory_episodic_write: A0
  memory_semantic_upsert: A0
  write_draft_file: A1
  write_local_markdown: A1
  runtime_init: A1
  write_workspace_draft: A1
  create_git_branch: A1
  create_cpo: A1
  create_draft_pr: A2
  create_ticket_draft: A2
  create_grc_draft: A2
  create_risk_proposal: A2
  create_risk_report: A1
  run_dependency_audit: A1
  assign_human: A3
  raise_priority: A3
  merge_pr: A4
  publish_policy: A4
  grc_write: A4
  create_ticket_live: A4
  memory_forget: A4
  memory_forget_tag: A4
  prod_iam_change: A5
  delete_audit_logs: A5
  secret_rotation: A5
  risk_acceptance: A5
  delete_evidence: A5

connectors:
  ticket:
    default_provider: none
    live_write_enabled: false
  grc:
    default_provider: none
    live_write_enabled: false
  notes:
    default_provider: filesystem
    live_write_enabled: false
  comms:
    default_provider: none
    live_write_enabled: false
  cloud:
    default_provider: none
    live_write_enabled: false
