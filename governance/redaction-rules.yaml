version: "1.0"
description: Deterministic secret/PII redaction applied before any persistence.

denylist_terms:
  - SUPER_SECRET_TOKEN
  - INTERNAL_API_KEY_PLACEHOLDER

regex_patterns:
  - name: aws_access_key
    pattern: "AKIA[0-9A-Z]{16}"
    replacement: "[REDACTED_AWS_KEY]"
  - name: aws_secret_key
    pattern: >-
      (?i)aws[_-]?secret[_-]?access[_-]?key\s*[:=]\s*["']?[A-Za-z0-9/+=]{40}["']?
    replacement: "[REDACTED_AWS_SECRET]"
  - name: generic_api_key
    pattern: >-
      (?i)(?:(?:password|passwd|pwd)\s*[:=]\s*["']?[^\s"']{4,}["']?|(?:api[_-]?key|token|secret)\s*[:=]\s*["']?[^\s"']{8,}["']?)
    replacement: "[REDACTED_SECRET]"
  - name: db_connection_string
    pattern: >-
      (?i)(postgresql|postgres|mysql|mongodb(?:\+srv)?|redis|amqp)://[^:@/\s]+:[^@/\s]+@
    replacement: "\\1://[REDACTED_CREDS]@"
  - name: url_embedded_credentials
    pattern: >-
      (?i)([a-z][a-z0-9+.-]*://)[^/\s:@]+:[^/\s:@]+@
    replacement: "\\1[REDACTED_CREDENTIALS]@"
  - name: github_token
    pattern: "gh[pousr]_[A-Za-z0-9]{36,}"
    replacement: "[REDACTED_GITHUB_TOKEN]"
  - name: github_pat
    pattern: "github_pat_[A-Za-z0-9_]{82}"
    replacement: "[REDACTED_GITHUB_TOKEN]"
  - name: gitlab_pat
    pattern: "glpat-[A-Za-z0-9_-]{20,}"
    replacement: "[REDACTED_GITLAB_TOKEN]"
  - name: slack_token
    pattern: "xox[baprs]-[A-Za-z0-9-]+"
    replacement: "[REDACTED_SLACK_TOKEN]"
  - name: slack_app_token
    pattern: "xapp-[A-Za-z0-9-]+"
    replacement: "[REDACTED_SLACK_TOKEN]"
  - name: jwt
    pattern: "eyJ[A-Za-z0-9_-]+\\.eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"
    replacement: "[REDACTED_JWT]"
  - name: bearer_token
    pattern: "Bearer\\s+[A-Za-z0-9\\-._~+/]+=*"
    replacement: "Bearer [REDACTED_TOKEN]"
  - name: gcp_oauth_token
    pattern: "ya29\\.[A-Za-z0-9._-]+"
    replacement: "[REDACTED_GCP_TOKEN]"
  - name: private_key_block
    pattern: >-
      -----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----[\s\S]*?-----END (?:RSA |EC |OPENSSH )?PRIVATE KEY-----
    replacement: "[REDACTED_PRIVATE_KEY]"
  - name: ssn
    pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    replacement: "[REDACTED_SSN]"
  - name: email
    pattern: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b"
    replacement: "[REDACTED_EMAIL]"
  - name: aws_arn
    pattern: "arn:aws:[a-z0-9-]+:[a-z0-9-]*:[0-9]{12}:[^\\s\"']*"
    replacement: "[REDACTED_ARN]"
  - name: gcp_resource_path
    pattern: "(?<!https:)//[a-z0-9.-]+\\.googleapis\\.com/[^\\s\"']+"
    replacement: "[REDACTED_GCP_RESOURCE]"
  - name: gcp_https_resource_url
    pattern: "https://[a-z0-9.-]+\\.googleapis\\.com/[^\\s\"']+"
    replacement: "[REDACTED_GCP_RESOURCE]"
  - name: aws_account_id
    pattern: "(?<![0-9a-f]{4}-)\\b[0-9]{12}\\b"
    replacement: "[REDACTED_ACCOUNT_ID]"
  - name: ipv4_address
    pattern: "\\b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\b"
    replacement: "[REDACTED_IP]"
